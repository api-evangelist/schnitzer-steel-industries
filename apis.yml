aid: schnitzer-steel-industries
name: Schnitzer Steel Industries
description: >-
  Schnitzer Steel Industries, now rebranded as Radius Recycling (acquired by
  Toyota Tsusho in 2025), is one of the largest manufacturers and exporters of
  recycled metal products in North America. The company processes scrap metal
  from automotive and industrial sources for use in steelmaking, operating 103
  recycling facilities including the Pick-n-Pull auto parts chain and Cascade
  Steel Rolling Mills in McMinnville, Oregon. Schnitzer/Radius Recycling does
  not expose a public developer API or developer portal.
